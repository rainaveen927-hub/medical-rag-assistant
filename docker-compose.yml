version: "3.9"

services:

  backend:
    build: .
    container_name: rag-backend
    ports:
      - "8000:8000"

  frontend:
    build: .
    container_name: rag-frontend
    command: streamlit run streamlit_app/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - backend