name: CI-CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      # -----------------------------------
      # Checkout Repository
      # -----------------------------------

      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------------------
      # Setup Python
      # -----------------------------------

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------
      # Install Dependencies
      # -----------------------------------

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # -----------------------------------
      # Create FAISS Vector Database
      # -----------------------------------

      - name: Create FAISS Vectorstore
        env:
          PYTHONPATH: .
        run: |
          python scripts/ingest_data.py

      # -----------------------------------
      # Run Tests
      # -----------------------------------

      - name: Run Tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests/

  docker:

    needs: test

    runs-on: ubuntu-latest

    steps:

      # -----------------------------------
      # Checkout Repository
      # -----------------------------------

      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------------------
      # Login To DockerHub
      # -----------------------------------

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -----------------------------------
      # Build Docker Image
      # -----------------------------------

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/medical-rag-assistant:latest .

      # -----------------------------------
      # Push Docker Image
      # -----------------------------------

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/medical-rag-assistant:latest